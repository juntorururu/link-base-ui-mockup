<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LINK MALL 検索UIモックアップ</title>
  <style>
    :root { --bg:#f2f7f7; --surface:#fff; --text:#333; --muted:#777; --line:#d2dbdb; --accent:#ff646b; --accent-dark:#f25059; --teal:#19a5a6; --footer:#3e3e3e; --shadow:0 2px 7px rgba(0,0,0,.12); }
    *{box-sizing:border-box} body{margin:0;background:#e8edf0;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;line-height:1.5} button,input,select{font:inherit}.stage{display:flex;justify-content:center;padding:24px}.phone{position:relative;width:min(100%,390px);border:9px solid #0a0a0a;border-radius:42px;background:#0a0a0a;box-shadow:0 10px 30px rgba(0,0,0,.24);overflow:hidden}.screen{height:780px;overflow-y:auto;border-radius:32px;background:#fff;scrollbar-width:none}.screen::-webkit-scrollbar{display:none}.status{height:34px;display:flex;align-items:end;justify-content:space-between;padding:0 22px 6px;background:#fff;font-size:13px;font-weight:700}.site-header{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;height:52px;padding:0 16px;background:#fff;border-bottom:1px solid #eee}.site-header img{display:block;width:72px;height:auto}.hamburger{width:44px;height:38px;border:1px solid #dedede;border-radius:4px;background:#fff;display:grid;gap:4px;place-content:center;cursor:pointer}.hamburger span{display:block;width:20px;height:2px;background:#777;border-radius:99px}.menu-panel{display:none;padding:12px 18px;background:#fff;border-bottom:1px solid #e5e5e5;box-shadow:var(--shadow)}.menu-panel.is-open{display:block}.menu-panel a{display:block;padding:9px 0;color:#555;text-decoration:none;font-size:14px;font-weight:700;border-bottom:1px solid #f0f0f0}.hero-photo{height:552px;background-image:url("https://link-base.jp/img/mall_top_sp_1.jpg");background-position:center;background-repeat:no-repeat;background-size:cover}.search-area{padding:18px 14px 16px;background:#fff}.search-card{border:1px solid #eee;border-radius:4px;background:#fff;padding:16px 16px 18px}.search-tabs{display:grid;grid-template-columns:repeat(3,1fr);margin:-16px -16px 16px;border-bottom:1px solid #e7e7e7}.tab-button{min-height:48px;border:0;border-right:1px solid #eee;background:#fafafa;color:#555;font-size:13px;font-weight:800;cursor:pointer}.tab-button:last-child{border-right:0}.tab-button.is-active{position:relative;color:var(--accent-dark);background:#fff}.tab-button.is-active:after{content:"";position:absolute;right:0;bottom:-1px;left:0;height:3px;background:var(--accent)}.tab-panel{display:none}.tab-panel.is-active{display:block}.field{margin-bottom:12px}.field label{display:block;margin-bottom:6px;color:#333;font-size:13px;font-weight:700}.field input,.field select{width:100%;min-height:34px;padding:6px 10px;border:1px solid #8ec5ff;border-radius:2px;background:#fff;color:#333;font-size:14px;outline:none}.search-button{display:block;width:202px;min-height:42px;margin:14px auto 0;border:0;border-radius:4px;background:var(--accent);color:#fff;font-size:15px;font-weight:800;cursor:pointer}.search-button:active{background:var(--accent-dark)}.suggest-block{margin-top:15px;padding-top:14px;border-top:1px solid #eee}.small-title{margin:0 0 9px;color:#333;font-size:13px;font-weight:800}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{border:1px solid #d2dbdb;border-radius:20px;padding:7px 10px;background:#fff;color:#4b4b4b;font-size:12px;font-weight:700;cursor:pointer}.chip.history{background:#f8fbfb}.condition-box{margin-top:15px;padding:13px;border-radius:4px;background:#f8fbfb;border:1px solid #e5eeee}.price-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-bottom:10px}.toggle-list{display:grid;gap:8px;margin:10px 0}.toggle{display:flex;align-items:center;justify-content:space-between;gap:10px;min-height:38px;padding:8px 10px;border:1px solid #d2dbdb;border-radius:20px;background:#fff;font-size:12px;font-weight:700;cursor:pointer}.switch{position:relative;flex:0 0 auto;width:38px;height:22px;border-radius:99px;background:#cfd8d8}.switch:after{content:"";position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:transform .16s ease}.toggle.is-on .switch{background:var(--teal)}.toggle.is-on .switch:after{transform:translateX(16px)}.rating{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:10px;font-size:12px;font-weight:800}.stars button{border:0;background:transparent;color:#ffb020;font-size:20px;padding:0 1px;cursor:pointer}.result-message{display:none;margin-top:14px;padding:10px;border-radius:4px;background:#fff0f1;color:#b64247;font-size:13px;font-weight:700}.result-message.is-visible{display:block}.category-section{display:none;padding:18px 14px 20px;background:var(--bg)}.category-section.is-visible{display:block}.section-title{margin:0 16px 12px;font-size:15px;font-weight:800}.category-list{display:grid;gap:14px}.category-button{width:100%;min-height:42px;border:2px solid var(--line);border-radius:22px;padding:9px 13px;background:#fff;color:#3f3f3f;text-align:left;font-size:13px;font-weight:700;cursor:pointer}.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.shop-card{min-height:74px;border:1px solid #e6e6e6;border-radius:6px;background:#fff;display:grid;place-items:center;padding:10px;text-align:center;color:#444;font-size:12px;font-weight:800;box-shadow:0 1px 3px rgba(0,0,0,.07);cursor:pointer}.cert-badge{display:inline-block;margin-top:3px;padding:2px 7px;border-radius:99px;background:#e8f8f8;color:#137d7e;font-size:10px}.blank-band{height:82px;background:#fff}.footer{padding:22px 20px 42px;background:var(--footer);color:#fff}.footer-title{margin-bottom:18px;font-size:20px;font-weight:800}.footer a{display:block;color:#fff;text-decoration:none;margin:0 0 9px 6px;font-size:13px;font-weight:600}.copyright{margin-top:18px;text-align:center;font-size:12px}.cart-button{position:absolute;right:30px;bottom:124px;z-index:30;display:grid;place-items:center;width:72px;height:72px;border:1px solid #dedede;border-radius:50%;background:#fff;box-shadow:2px 2px #bcbcbc;cursor:pointer}.cart-button img{width:34px;height:34px}.toast{position:absolute;left:22px;right:22px;bottom:212px;z-index:40;display:none;padding:11px 13px;border-radius:8px;background:rgba(51,51,51,.92);color:#fff;font-size:13px;font-weight:700;text-align:center}.toast.is-visible{display:block}@media(max-width:430px){.stage{padding:0;background:#fff}.phone{width:100%;border:0;border-radius:0;box-shadow:none}.screen{height:auto;min-height:100vh;border-radius:0}.cart-button{position:fixed;right:28px;bottom:72px}.toast{position:fixed;bottom:152px}}
  </style>
</head>
<body>
  <div class="stage"><div class="phone"><div class="screen" id="screen">
    <div class="status"><span>13:47</span><span>▮▮▮ Wi-Fi ▰</span></div>
    <header class="site-header"><a href="#" aria-label="LINK MALL"><img src="https://link-base.jp/img/mall_logo.png" alt="LINK MALL"></a><button class="hamburger" type="button" aria-label="メニューを開く" aria-expanded="false"><span></span><span></span><span></span></button></header>
    <nav class="menu-panel" aria-label="メニュー"><a href="#keyword-panel">検索エリアへ</a><a href="#category-list">カテゴリーから探す</a><a href="#footer">フッターへ</a></nav>
    <div class="hero-photo" aria-label="LINK MALLメインビジュアル"></div>
    <main>
      <section class="search-area" aria-label="検索フォーム"><div class="search-card">
        <div class="search-tabs" role="tablist" aria-label="検索種別"><button class="tab-button is-active" type="button" role="tab" aria-selected="true" data-tab="keyword">キーワード検索</button><button class="tab-button" type="button" role="tab" aria-selected="false" data-tab="category">カテゴリ検索</button><button class="tab-button" type="button" role="tab" aria-selected="false" data-tab="shop">ショップ検索</button></div>
        <div class="tab-panel is-active" id="keyword-panel" role="tabpanel"><div class="field"><label for="keyword">キーワード</label><input id="keyword" type="text" placeholder="例：オーガニック、浄水器、防災商品"></div><button class="search-button" type="button" data-action="keyword-search">検索する</button><div class="suggest-block"><p class="small-title">サジェスト（オートコンプリート）</p><div class="chips"><button class="chip" type="button" data-fill="オーガニック 食品">オーガニック 食品</button><button class="chip" type="button" data-fill="防災セット">防災セット</button><button class="chip" type="button" data-fill="浄水器">浄水器</button><button class="chip" type="button" data-fill="ハンドメイド">ハンドメイド</button></div></div><div class="suggest-block"><p class="small-title">検索履歴</p><div class="chips"><button class="chip history" type="button" data-fill="食品 ギフト">食品 ギフト</button><button class="chip history" type="button" data-fill="調理器具">調理器具</button><button class="chip history" type="button" data-fill="美容 健康">美容 健康</button></div></div><div class="condition-box"><p class="small-title">検索条件</p><div class="price-row"><div class="field"><label for="min-price">価格下限</label><input id="min-price" type="number" placeholder="円以上"></div><span>〜</span><div class="field"><label for="max-price">価格上限</label><input id="max-price" type="number" placeholder="円以下"></div></div><div class="toggle-list"><button class="toggle" type="button"><span>送料無料</span><span class="switch"></span></button><button class="toggle" type="button"><span>まとめ出荷対応</span><span class="switch"></span></button><button class="toggle" type="button"><span>送料無料ライン対象</span><span class="switch"></span></button><button class="toggle" type="button"><span>マスター認定 / エキスパート認定</span><span class="switch"></span></button></div><div class="rating"><span>レビュー評価</span><span class="stars" aria-label="レビュー評価"><button type="button" data-star="1">☆</button><button type="button" data-star="2">☆</button><button type="button" data-star="3">☆</button><button type="button" data-star="4">☆</button><button type="button" data-star="5">☆</button></span></div><div class="field" style="margin-top:12px"><label for="sort">並び替え</label><select id="sort"><option>おすすめ</option><option>新着順</option><option>古い順</option><option>価格の高い順</option><option>価格の安い順</option><option>レビュー評価順</option><option>認定掲載者順</option></select></div></div><div class="result-message" id="keyword-result"></div></div>
        <div class="tab-panel" id="category-panel" role="tabpanel"><div class="field"><label for="category-select">カテゴリー</label><select id="category-select"><option value="">選択してください</option><option>SASAEAI バリュー</option><option>ファーマーズサポート -産地直送便-</option><option>家電・調理器具</option><option>食品</option><option>美容・衛生・健康</option><option>家具・インテリア</option><option>ファッション</option><option>防災商品</option></select></div><div class="field"><label for="subcategory-select">サブカテゴリー</label><select id="subcategory-select"><option value="">カテゴリー選択後に表示</option></select></div><button class="search-button" type="button" data-action="category-search">検索する</button><div class="result-message" id="category-result"></div></div>
        <div class="tab-panel" id="shop-panel" role="tabpanel"><div class="field"><label for="shop-keyword">ショップ・事業者名</label><input id="shop-keyword" type="text" placeholder="例：LINK FARMERS"></div><div class="shop-grid"><button class="shop-card" type="button" data-shop="LINK FARMERS">LINK FARMERS<br><span class="cert-badge">マスター認定</span></button><button class="shop-card" type="button" data-shop="Natural Care">Natural Care<br><span class="cert-badge">エキスパート認定</span></button><button class="shop-card" type="button" data-shop="SASAEAI バリュー">SASAEAI バリュー</button><button class="shop-card" type="button" data-shop="防災セレクト">防災セレクト</button></div><button class="search-button" type="button" data-action="shop-search">検索する</button><div class="result-message" id="shop-result"></div></div>
      </div></section>
      <section class="category-section" id="category-list" aria-label="カテゴリーから探す"><h2 class="section-title">カテゴリーから探す</h2><div class="category-list"><button class="category-button" type="button" data-category="SASAEAI バリュー">SASAEAI バリュー</button><button class="category-button" type="button" data-category="ファーマーズサポート -産地直送便-">ファーマーズサポート -産地直送便-</button><button class="category-button" type="button" data-category="家電・調理器具">家電・調理器具</button><button class="category-button" type="button" data-category="食品">食品</button><button class="category-button" type="button" data-category="美容・衛生・健康">美容・衛生・健康</button><button class="category-button" type="button" data-category="家具・インテリア">家具・インテリア</button><button class="category-button" type="button" data-category="ファッション">ファッション</button><button class="category-button" type="button" data-category="書籍・絵本・音楽">書籍・絵本・音楽</button><button class="category-button" type="button" data-category="玩具">玩具</button><button class="category-button" type="button" data-category="ペット">ペット</button><button class="category-button" type="button" data-category="ネットワークビジネス・MLA">ネットワークビジネス・MLA</button><button class="category-button" type="button" data-category="車・バイク">車・バイク</button><button class="category-button" type="button" data-category="生活雑貨・キッチン用品">生活雑貨・キッチン用品</button><button class="category-button" type="button" data-category="スピリチュアル・占い">スピリチュアル・占い</button><button class="category-button" type="button" data-category="ハンドメイド">ハンドメイド</button><button class="category-button" type="button" data-category="防災商品">防災商品</button></div></section>
      <div class="blank-band"></div><footer class="footer" id="footer"><div class="footer-title">LINK</div><a href="#">LINK MALL</a><a href="#">LINK SHOP</a><a href="#">LINK SERVICE</a><a href="#">LINK JOB</a><a href="#">SASAEAI</a><br><a href="#">お問い合わせ</a><a href="#">利用規約</a><a href="#">特定商取引法に関する表記</a><a href="#">プライバシーポリシー</a><div class="copyright">© 株式会社LINK</div></footer>
    </main></div><button class="cart-button" type="button" aria-label="カート"><img src="https://link-base.jp/img/cart_icon.png" alt=""></button><div class="toast" id="toast"></div></div></div>
  <script>
    const tabs=document.querySelectorAll('.tab-button'),panels={keyword:document.querySelector('#keyword-panel'),category:document.querySelector('#category-panel'),shop:document.querySelector('#shop-panel')},categoryList=document.querySelector('#category-list'),screen=document.querySelector('#screen'),toast=document.querySelector('#toast');let rating=0;function showToast(m){toast.textContent=m;toast.classList.add('is-visible');clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>toast.classList.remove('is-visible'),1600)}function activateTab(name,shouldScroll=false){tabs.forEach(t=>{const a=t.dataset.tab===name;t.classList.toggle('is-active',a);t.setAttribute('aria-selected',a?'true':'false')});Object.entries(panels).forEach(([k,p])=>p.classList.toggle('is-active',k===name));categoryList.classList.toggle('is-visible',name==='category');if(name==='category')categoryList.scrollIntoView({behavior:shouldScroll?'smooth':'auto',block:'start'})}tabs.forEach(t=>t.addEventListener('click',()=>activateTab(t.dataset.tab,true)));document.querySelector('.hamburger').addEventListener('click',e=>{const p=document.querySelector('.menu-panel'),o=p.classList.toggle('is-open');e.currentTarget.setAttribute('aria-expanded',o?'true':'false')});document.querySelectorAll('[data-fill]').forEach(b=>b.addEventListener('click',()=>{document.querySelector('#keyword').value=b.dataset.fill;showToast('キーワードに反映しました')}));document.querySelectorAll('.toggle').forEach(b=>b.addEventListener('click',()=>b.classList.toggle('is-on')));document.querySelectorAll('[data-star]').forEach(b=>b.addEventListener('click',()=>{rating=Number(b.dataset.star);document.querySelectorAll('[data-star]').forEach(s=>{s.textContent=Number(s.dataset.star)<=rating?'★':'☆'})}));document.querySelector('[data-action="keyword-search"]').addEventListener('click',()=>{const k=document.querySelector('#keyword').value||'未入力',s=document.querySelector('#sort').value,r=document.querySelector('#keyword-result');r.textContent=`「${k}」で検索します。並び替え：${s}、レビュー：${rating||'指定なし'}`;r.classList.add('is-visible')});const subcategories={'家電・調理器具':['キッチン家電','生活家電','調理器具','浄水器'],'食品':['レトルト食品','冷凍食品','飲料','生鮮食品'],'美容・衛生・健康':['マスク','化粧品','消臭・除菌','アロマ・お香'],'家具・インテリア':['ソファ','ベッド','テレビ台','観葉植物・園芸'],'防災商品':['防災セット','備蓄用品','ライト・電源']};document.querySelector('#category-select').addEventListener('change',e=>{const sel=document.querySelector('#subcategory-select');sel.innerHTML='<option value="">選択してください</option>';(subcategories[e.target.value]||['該当サブカテゴリーなし']).forEach(n=>{const o=document.createElement('option');o.textContent=n;sel.appendChild(o)})});document.querySelector('[data-action="category-search"]').addEventListener('click',()=>{const c=document.querySelector('#category-select').value||'未選択',s=document.querySelector('#subcategory-select').value||'指定なし',r=document.querySelector('#category-result');r.textContent=`カテゴリー「${c}」、サブカテゴリー「${s}」で検索します。`;r.classList.add('is-visible')});document.querySelectorAll('.category-button').forEach(b=>b.addEventListener('click',()=>{activateTab('category',false);document.querySelector('#category-select').value=b.dataset.category;document.querySelector('#category-select').dispatchEvent(new Event('change'));document.querySelector('#category-result').textContent=`カテゴリー「${b.dataset.category}」を選択しました。`;document.querySelector('#category-result').classList.add('is-visible');screen.scrollTo({top:document.querySelector('.search-area').offsetTop,behavior:'smooth'})}));document.querySelectorAll('.shop-card').forEach(b=>b.addEventListener('click',()=>{document.querySelector('#shop-keyword').value=b.dataset.shop;showToast('ショップ名に反映しました')}));document.querySelector('[data-action="shop-search"]').addEventListener('click',()=>{const shop=document.querySelector('#shop-keyword').value||'未入力',r=document.querySelector('#shop-result');r.textContent=`ショップ・事業者「${shop}」で検索します。`;r.classList.add('is-visible')});document.querySelector('.cart-button').addEventListener('click',()=>showToast('カートボタンの動作イメージです'));
  </script>
</body>
</html>
